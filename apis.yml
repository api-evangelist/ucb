---
aid: ucb
name: University of California, Berkeley
description: >-
  The University of California, Berkeley (UC Berkeley) is a public land-grant
  research university and the flagship campus of the University of California
  system, ranked #12 in the QS World University Rankings 2025. Berkeley operates
  a formal, centrally governed API program through its Integration Services /
  Enterprise Information Services team, exposing campus data via the API Central
  developer portal and a shared API Gateway. Access is gated behind CalNet
  identity and Data Owner approval, with interactive OpenAPI-based documentation
  and gateway-level authentication, authorization, and rate limiting. Public,
  uncredentialed footprint also includes the UC-wide eScholarship repository
  APIs/OAI-PMH and library Alma/Primo metadata services.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/ucb/refs/heads/main/apis.yml
tags:
